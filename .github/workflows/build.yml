name: Build and Release DNSTT

on:
  push:
    tags:
      - 'v*' # 触发条件1：当你推送 v 开头的 tag (如 v1.0.0) 时自动执行
  workflow_dispatch: # 触发条件2：允许你在 GitHub 网页端 Actions 标签页手动点击 "Run workflow" 运行

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 关键：赋予 GITHUB_TOKEN 创建 Release 和上传文件的权限

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5 # 更新到较新的 action 版本
      with:
        go-version: '1.21' # 建议使用 1.21 或以上

    - name: Clone and Cross-Compile
      run: |
        git clone https://www.bamsoftware.com/git/dnstt.git
        mkdir -p release_assets
        
        # 定义需要编译的目标系统和架构组合
        PLATFORMS="linux/amd64 linux/arm64 linux/386 windows/amd64 windows/arm64 windows/386 darwin/amd64 darwin/arm64"
        
        cd dnstt
        
        # 遍历目标平台进行编译
        for PLATFORM in $PLATFORMS; do
          GOOS=${PLATFORM%/*}
          GOARCH=${PLATFORM#*/}
          echo "Building for $GOOS/$GOARCH..."
          
          # 给 Windows 系统的可执行文件加上 .exe 后缀
          EXT=""
          if [ "$GOOS" = "windows" ]; then
            EXT=".exe"
          fi
          
          # 编译 Server
          cd dnstt-server
          GOOS=$GOOS GOARCH=$GOARCH go build -o ../../release_assets/dnstt-server-${GOOS}-${GOARCH}${EXT}
          cd ..
          
          # 编译 Client
          cd dnstt-client
          GOOS=$GOOS GOARCH=$GOARCH go build -o ../../release_assets/dnstt-client-${GOOS}-${GOARCH}${EXT}
          cd ..
        done

    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: release_assets/*
        # 如果是手动触发(workflow_dispatch)，需要指定一个 tag name，如果是 push tag 触发则自动使用该 tag
        tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest-build' }}
        name: "DNSTT Automated Build"
        generate_release_notes: true
